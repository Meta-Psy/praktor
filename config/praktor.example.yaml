telegram:
  token: "${PRAKTOR_TELEGRAM_TOKEN}"
  allow_from: []                    # Empty = allow all; list of Telegram user IDs
  main_chat_id: 0                   # Chat ID for scheduled task results

defaults:
  image: "praktor-agent:latest"
  model: "claude-sonnet-4-6"           # Default Claude model for agents
  max_running: 5
  idle_timeout: 10m
  anthropic_api_key: "${ANTHROPIC_API_KEY}"
  oauth_token: "${CLAUDE_CODE_OAUTH_TOKEN}"

agents:
  general:
    description: "General-purpose assistant for everyday tasks"
    workspace: general
    # agentmail_inbox_id: "general@agentmail.to"  # AgentMail inbox (optional)
  coder:
    description: "Software engineering specialist"
    model: "claude-opus-4-8"
    workspace: coder
    nix_enabled: true                              # Enable nix package manager
    env:
      EDITOR: vim                            # Regular env var
      GITHUB_TOKEN: "secret:github-token"    # Resolved from vault at container start
    files:
      - secret: gcp-service-account          # Secret name in vault
        target: /etc/gcp/sa.json             # Path inside container
        mode: "0600"                         # File permissions (default: 0600)
  researcher:
    description: "Web research and analysis"
    workspace: researcher
    allowed_tools: [WebSearch, WebFetch, Read, Write]

router:
  default_agent: general

web:
  enabled: true
  port: 8080
  auth: "${PRAKTOR_WEB_PASSWORD}"    # Basic auth for dashboard

vault:
  passphrase: "${PRAKTOR_VAULT_PASSPHRASE}"

agentmail:
  api_key: "${AGENTMAIL_API_KEY}"    # AgentMail API key (optional)

speech:
  api_key: "${OPENAI_API_KEY}"          # OpenAI API key for STT/TTS (optional, disabled if empty)
  tts_enabled: false                    # Enable text-to-speech voice responses
  tts_mode: "voice"                     # "voice" = respond with voice only when user sends voice, "always" = all responses, "never" = disabled
  tts_voice: "alloy"                    # OpenAI TTS voice (alloy, echo, fable, onyx, nova, shimmer)

scheduler:
  poll_interval: 30s

# Mission Control cross-project roll-up + actions (F.2/F.3).
# Read aggregation uses env GITHUB_READ_TOKEN; approve/merge/deploy use env
# GITHUB_WRITE_TOKEN (fine-grained, both repos: contents+pull_requests+issues+actions:write).
# Deploy mechanism per project — set exactly one of deploy_workflow / deploy_host_dir:
#   deploy_workflow:        GitHub Actions workflow file to dispatch (ref=main)
#   deploy_host_dir:        host path of a git working copy to pull + compose rebuild
#   deploy_compose_project: compose -p name (MUST match the existing stack name)
projects:
  pdai:
    repo: Meta-Psy/pdai_calculator
    agents: [coder, notifier]
    deploy_url: https://skinlabpro.uz
    deploy_workflow: deploy.yml
  gnathology:
    repo: Meta-Psy/gnathology-bot
    agents: [gnatho-coder]
    health: http://gnathology-bot:8099/health
    deploy_host_dir: /opt/apps/gnathology-bot/deploy
    deploy_compose_project: gnathology-bot
